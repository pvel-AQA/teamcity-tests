    - name: Restore TeamCity from backup (with full logging)
      shell: bash
      run: |
        cd ${{ inputs.docker-compose-dir }}

        # Создаём database.properties
        cat > /tmp/database.properties << 'EOF'
        connectionUrl=jdbc:postgresql://postgres:5432/teamcity
        connectionProperties.user=teamcity
        connectionProperties.password=teamcity_secret
        connectionProperties.autosave=conservative
        maxConnections=50
        testOnBorrow=false
        EOF

        echo "=== Starting restore with FULL LOGGING ==="

        # Запускаем restore и сохраняем ВСЕ выводы
        docker run --rm \
          --network teamcity-net \
          --user root \
          -v tc-server-data:/data/teamcity_server/datadir \
          -v "$(pwd)/backup/tc-backup.zip:/temporary/tc-backup.zip:ro" \
          -v /tmp/database.properties:/tmp/database.properties:ro \
          -v "$(pwd)/jdbc/postgresql-42.7.3.jar:/opt/teamcity/lib/jdbc/postgresql.jar:ro" \
          jetbrains/teamcity-server:2026.1.1 \
          bash -c '
            set -x  # Включаем отладку команд

            echo "=== 1. Checking files ==="
            ls -la /temporary/
            ls -la /tmp/database.properties
            ls -la /opt/teamcity/lib/jdbc/

            echo "=== 2. Testing database connection ==="
            cd /opt/teamcity/bin
            ./maintainDB.sh test \
              -T /tmp/database.properties || echo "Test connection failed with code $?"

            echo "=== 3. Running restore ==="
            ./maintainDB.sh restore \
              -A /data/teamcity_server/datadir \
              -F /temporary/tc-backup.zip \
              -T /tmp/database.properties \
              -v  # Verbose режим

            RESTORE_CODE=$?
            echo "=== Restore exit code: $RESTORE_CODE ==="

            if [ $RESTORE_CODE -ne 0 ]; then
              echo "❌ RESTORE FAILED with code $RESTORE_CODE"
              exit $RESTORE_CODE
            fi

            echo "=== 4. Restore completed successfully ==="
          '

        RESTORE_EXIT_CODE=$?
        echo "=== Restore command exit code: $RESTORE_EXIT_CODE ==="

        if [ $RESTORE_EXIT_CODE -ne 0 ]; then
          echo "::error::Restore failed with exit code $RESTORE_EXIT_CODE"
          exit $RESTORE_EXIT_CODE
        fi

    - name: Start TeamCity server after restore
      shell: bash
      run: |
        cd ${{ inputs.docker-compose-dir }}
        docker compose -p teamcity up -d teamcity-server

    - name: Wait for TeamCity to be ready
      shell: bash
      run: |
        until curl -s http://localhost:8111/login.html > /dev/null; do
          echo "Waiting for TeamCity..."
          sleep 3
        done
        echo "TeamCity is ready"

    - name: Start remaining services (agent, selenoid)
      shell: bash
      run: |
        cd ${{ inputs.docker-compose-dir }}
        docker compose -p teamcity up -d teamcity-agent selenoid selenoid-ui
