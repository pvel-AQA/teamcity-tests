name: 'Setup TeamCity CI'
description: 'Starts postgres, restores TeamCity from backup, then starts server, agent and selenoid'
inputs:
  teamcity-backup-url:
    description: 'Direct link to TeamCity backup ZIP'
    required: true
  docker-compose-dir:
    description: 'Path to docker-compose directory'
    required: false
    default: 'infra/docker_compose'
outputs:
  teamcity_token:
    description: 'TeamCity super user authentication token'
    value: ${{ steps.teamcity_token.outputs.TOKEN }}

runs:
  using: 'composite'
  steps:
    - name: Start only Postgres
      shell: bash
      run: |
        cd ${{ inputs.docker-compose-dir }}
        docker compose -p teamcity up -d postgres

    - name: Wait for Postgres
      shell: bash
      run: |
        until docker exec teamcity-postgres pg_isready -U teamcity -d teamcity; do
          echo "Waiting for Postgres..."
          sleep 2
        done

    - name: Download TeamCity backup from Google Drive
      shell: bash
      run: |
        mkdir -p ${{ inputs.docker-compose-dir }}/backup
        curl -L "${{ inputs.teamcity-backup-url }}" \
          -o ${{ inputs.docker-compose-dir }}/backup/tc-backup.zip

    - name: Verify TeamCity backup file
      shell: bash
      run: |
        BACKUP_FILE="${{ inputs.docker-compose-dir }}/backup/tc-backup.zip"

        if [ ! -f "$BACKUP_FILE" ]; then
          echo "::error::Backup file not found: $BACKUP_FILE"
          exit 1
        fi

        if [ ! -s "$BACKUP_FILE" ]; then
          echo "::error::Backup file is empty: $BACKUP_FILE"
          exit 1
        fi

        if ! unzip -tq "$BACKUP_FILE" > /dev/null 2>&1; then
          echo "::error::Backup file is not a valid ZIP or is corrupted: $BACKUP_FILE"
          exit 1
        fi

        FILE_SIZE=$(du -h "$BACKUP_FILE" | cut -f1)
        echo "Backup file OK: $BACKUP_FILE (size: $FILE_SIZE)"

    - name: Restore TeamCity from backup
      shell: bash
      run: |
        cd ${{ inputs.docker-compose-dir }}

        # Создаём database.properties для restore
        cat > /tmp/database.properties << 'EOF'
        connectionUrl=jdbc:postgresql://postgres:5432/teamcity
        connectionProperties.user=teamcity
        connectionProperties.password=teamcity_secret
        connectionProperties.autosave=conservative
        maxConnections=50
        testOnBorrow=false
        EOF

        docker run --rm \
          --network teamcity-net \
          --user root \
          -v tc-server-data:/data/teamcity_server/datadir \
          -v "$(pwd)/backup/tc-backup.zip:/temporary/tc-backup.zip:ro" \
          -v /tmp/database.properties:/tmp/database.properties:ro \
          -v "$(pwd)/jdbc/postgresql-42.7.3.jar:/opt/teamcity/lib/jdbc/postgresql.jar:ro" \
          jetbrains/teamcity-server:2026.1.1 \
          bash -c '
            set -e
            cd /opt/teamcity/bin
            ./maintainDB.sh restore \
              -A /data/teamcity_server/datadir \
              -F /temporary/tc-backup.zip \
              -T /tmp/database.properties
          '

    - name: Start TeamCity server after restore
      shell: bash
      run: |
        cd ${{ inputs.docker-compose-dir }}
        docker compose -p teamcity up -d teamcity-server

    - name: Wait for TeamCity to be ready
      shell: bash
      run: |
        echo "⏳ Waiting for TeamCity REST API..."

        for i in {1..120}; do
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8111/app/rest/server || echo "000")

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "401" ]; then
            echo "✅ TeamCity is ready! (HTTP $HTTP_CODE)"
            exit 0
          fi

          if [ $((i % 10)) -eq 0 ]; then
            echo "Still waiting... ($i/120) - HTTP $HTTP_CODE"
            docker logs teamcity-server --tail 5
          fi

          sleep 5
        done

        echo "❌ TeamCity failed to start within timeout"
        echo "=== TeamCity logs ==="
        docker logs teamcity-server --tail 100
        exit 1

    - name: Extract TeamCity super user token
      id: teamcity_token
      shell: bash
      run: |
        # Ждём, пока в логах появится строка с токеном (на случай, если ещё не успела)
        for i in {1..30}; do
          TOKEN=$(docker logs teamcity-server 2>&1 \
            | grep -oP 'Super user authentication token: \K[0-9]+' | head -n1)
          if [ -n "$TOKEN" ]; then
            echo "TOKEN=$TOKEN" >> "$GITHUB_OUTPUT"
            echo "✅ Super user token found: $TOKEN"
            exit 0
          fi
          echo "Token not found yet, attempt $i/30..."
          sleep 5
        done
      
        echo "::error::Super user token not found in logs"
        docker logs teamcity-server --tail 100
        exit 1

    - name: Start remaining services (agent, selenoid)
      shell: bash
      run: |
        cd ${{ inputs.docker-compose-dir }}
        docker compose -p teamcity up -d teamcity-agent selenoid selenoid-ui

    - name: Wait for agent to connect
      shell: bash
      env:
        TC_TOKEN: ${{ steps.teamcity_token.outputs.TOKEN }}
      run: |
        echo "⏳ Waiting for agent to connect..."
        
        for i in {1..60}; do
          # Получаем ответ
          RESPONSE=$(curl -s -H "Authorization: Bearer $TC_TOKEN" \
            "http://localhost:8111/app/rest/agents?locator=connected:true")
        
          # Проверяем, что ответ не пустой и содержит "count"
          if [ -n "$RESPONSE" ] && echo "$RESPONSE" | grep -q '"count"'; then
            # Извлекаем count через grep и sed (без jq)
            COUNT=$(echo "$RESPONSE" | grep -o '"count":[0-9]*' | sed 's/"count"://')
        
            # Если count не найден, ставим 0
            if [ -z "$COUNT" ]; then
              COUNT=0
            fi
        
            echo "Attempt $i/60: Found $COUNT agent(s)"
        
            if [ "$COUNT" -ge 1 ]; then
              echo "✅ Agent connected!"
              echo "Agent details:"
              echo "$RESPONSE" | grep -o '"name":"[^"]*"' | head -1
              exit 0
            fi
          else
            # Сервер не вернул JSON - возможно еще не готов
            echo "Attempt $i/60: Server not ready or invalid response"
            # Показываем первые 100 символов ответа для диагностики
            if [ -n "$RESPONSE" ]; then
              echo "Response preview: ${RESPONSE:0:100}"
            fi
          fi
        
          sleep 5
        done
        
        echo "❌ Agent did not connect within timeout"
        echo "=== Agent logs ==="
        docker logs teamcity-agent --tail 50
        echo "=== Server logs (last 20 lines) ==="
        docker logs teamcity-server --tail 20
        exit 1
