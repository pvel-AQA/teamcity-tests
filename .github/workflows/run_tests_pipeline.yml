name: Run tests

on: [ push, workflow_dispatch ]

# stages analogy
jobs:
  run_tests:
    name: Set up services (review apps) and run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: '21'

      - name: Cache Maven repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Pull and cache browser images
        uses: ./.github/actions/pull-and-cache-browsers

      - name: Setup TeamCity for CI
        uses: ./.github/actions/setup-teamcity-ci
        with:
          teamcity-backup-url: ${{ secrets.TEAMCITY_BACKUP_URL }}
          docker-compose-dir: infra/docker_compose

      - name: Run tests
        run: ./mvnw clean test -P all -q
        env:
          APIBASEURL: http://localhost:8111/app/rest
          UIBASEURL: http://localhost:8111
          BROWSERREMOTE: http://localhost:4444/wd/hub

#      - name: Run Swagger Coverage
#        if: always()
#        run: .swagger-coverage-commandline/bin/swagger-coverage-commandline -s openmrs-swagger.json -i target/swagger-coverage-output

      - name: Load test report history
        uses: actions/checkout@v6
        if: always()
        with:
          ref: gh-pages
          path: gh-pages

      - name: Build test report
        uses: simple-elf/allure-report-action@v1.14
        if: always()
        with:
          gh_pages: gh-pages
          allure_results: target/allure-results
          allure_history: allure-history
#
#      - name: Build Swagger Coverage report
#        if: always()
#        run: sudo cp swagger-coverage-report.html allure-history/${{ github.run_number }}
#
      - name: Publish test report
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Clean up services
        if: always()
        run: cd infra/docker_compose && docker compose -p teamcity down

  notify:
    name: Telegram notification
    needs: [ run_tests ]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send Telegram notification
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: html
          message: |
            <b>${{ needs.run_tests.result == 'success' && '✅ Passed' || '❌ Failed' }}</b> — Teamcity tests
            Branch: <code>${{ github.ref_name }}</code>
            Commit: ${{ github.actor }} — ${{ github.event.head_commit.message }}

            <b>📊 Reports:</b>
            Allure Report: <a href="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ github.run_number }}/index.html">${{ github.event.repository.name }} Allure</a>
            <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">View run &amp; logs</a>
